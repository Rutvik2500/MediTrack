<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack - Create Account</title>
    <style>
        :root {
            --primary-color: #008080;
            --background-color: #f7fafc;
            --card-background: #ffffff;
            --text-main: #1a202c;
            --text-secondary: #4a5568;
            --border-color: #e2e8f0;
            --input-background: #edf2f7;
            --input-border: #cbd5e0;
            --btn-hover: #006666;
        }

        [data-theme="dark"] {
            --background-color: #1a202c;
            --card-background: #2d3748;
            --text-main: #f7fafc;
            --text-secondary: #a0aec0;
            --border-color: #4a5568;
            --input-background: #1a202c;
            --input-border: #4a5568;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--background-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-background);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .signup-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .back-link {
            align-self: flex-start;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-box {
            background-color: var(--primary-color);
            border-radius: 12px;
            padding: 10px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-main);
            margin: 0 0 8px 0;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
        }

        .signup-card {
            background-color: var(--card-background);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            padding: 35px;
            box-sizing: border-box;
            transition: background-color 0.3s;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-relative {
            position: relative;
        }

        .input-relative input {
            width: 100%;
            padding: 14px 40px 14px 40px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            background-color: var(--input-background);
            color: var(--text-main);
            transition: border-color 0.2s, background-color 0.3s, color 0.3s;
        }

        .input-relative input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: var(--card-background);
        }

        .left-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
        }

        .eye-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        .input-hint {
            display: block;
            font-size: 11px;
            color: #a0aec0;
            margin-top: 5px;
        }

        .terms-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
            font-size: 13px;
            color: var(--text-secondary);
            gap: 10px;
        }

        .terms-group input {
            margin-top: 3px;
            cursor: pointer;
        }

        .terms-group a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .terms-group a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--btn-hover);
        }

        .login-text {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 25px;
        }

        .login-text a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .login-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <button onclick="toggleTheme()" class="theme-toggle">🌓 Theme</button>

    <div class="signup-container">
        
        <a href="login.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Login
        </a>

        <div class="header">
            <div class="logo-box">
                <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="25" y="10" width="50" height="80" rx="25" stroke="#ffffff" stroke-width="8"/>
                    <path d="M25 50 h50 v15 a25 25 0 0 1 -50 0 z" fill="#ffffff"/>
                </svg>
            </div>
            <h1>Create Account</h1>
            <p>Join MediTrack to manage your medications</p>
        </div>

        <div class="signup-card">
            <form id="signupForm" action="login.html">
                
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <div class="input-relative">
                        <svg class="left-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-relative">
                        <svg class="left-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-relative">
                        <svg class="left-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" placeholder="Create a password" required>
                        <svg class="eye-toggle" onclick="togglePassword('password')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                    <span class="input-hint">Must be at least 8 characters</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-relative">
                        <svg class="left-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                        <svg class="eye-toggle" onclick="togglePassword('confirmPassword')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                </div>

                <div class="terms-group">
                    <input type="checkbox" required>
                    <label>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <p class="login-text">
                Already have an account? <a href="login.html">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        const signupForm = document.getElementById('signupForm');

		signupForm.addEventListener('submit', async (e) => {
			e.preventDefault();
			
			// Get values from the inputs
			const fullName = document.querySelector('input[placeholder="Enter your full name"]').value;
			const email = document.querySelector('input[placeholder="your@email.com"]').value;
			const password = document.getElementById('password').value;
			const confirmPassword = document.getElementById('confirmPassword').value;

			if (password !== confirmPassword) {
				alert("Passwords do not match!");
				return;
			}

			const userData = {
				fullName: fullName,
				email: email,
				password: password,
				role: "PATIENT" // Defaulting to patient for this form
			};

			try {
				const response = await fetch('http://localhost:8080/api/auth/signup', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json'
					},
					body: JSON.stringify(userData)
				});

				if (response.ok) {
					alert("Account created successfully!");
					window.location.href = 'login.html';
				} else {
					alert("Signup failed. Email might already be in use.");
				}
			} catch (error) {
				console.error("Error:", error);
				alert("Could not connect to the server.");
			}
		});
    </script>
</body>
</html>
